name: Deploy to DigitalOcean

on:
  push:
    branches:
      - main

concurrency:
  group: product-registration-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH
        run: |
          set -x

          mkdir -p ~/.ssh

          cat > ~/.ssh/do_key << 'EOF'
          ${{ secrets.DO_SSH_KEY }}
          EOF

          echo "SSH directory:"
          ls -la ~/.ssh

          echo "Key line count:"
          wc -l ~/.ssh/do_key

          echo "Validating key format:"
          ssh-keygen -l -f ~/.ssh/do_key

          chmod 600 ~/.ssh/do_key

          echo "Testing ssh-keyscan..."
          ssh-keyscan -p "${{ secrets.DO_PORT }}" -H "${{ secrets.DO_HOST }}" >> ~/.ssh/known_hosts

          echo "SSH setup complete"

      - name: Deploy on DigitalOcean
        run: |
          ssh -i ~/.ssh/do_key \
              -o StrictHostKeyChecking=yes \
              -p "${{ secrets.DO_PORT }}" \
              "${{ secrets.DO_USER }}@${{ secrets.DO_HOST }}" << 'EOF'

            set -e

            APP_DIR="/var/www/product-registration-app"
            BRANCH="main"
            NODE_OPTIONS_VALUE="--dns-result-order=ipv4first --no-network-family-autoselection"

            echo "Going to app directory..."
            cd "$APP_DIR"

            echo "Checking required .env files..."
            test -f backend/.env
            test -f frontend/.env

            echo "Cleaning local changes..."
            git reset --hard
            git clean -fd

            echo "Pulling latest code..."
            git fetch origin "$BRANCH"
            git checkout "$BRANCH"
            git pull --ff-only origin "$BRANCH"

            echo "Installing backend dependencies..."
            cd "$APP_DIR/backend"

            if [ -f package-lock.json ]; then
              npm ci
            else
              npm install
            fi

            echo "Installing frontend dependencies..."
            cd "$APP_DIR/frontend"
            npm install

            echo "Building frontend..."
            npm run build

            echo "Restarting backend..."
            cd "$APP_DIR/backend"

            NODE_OPTIONS="$NODE_OPTIONS_VALUE" pm2 restart product-registration-backend --update-env || \
            NODE_OPTIONS="$NODE_OPTIONS_VALUE" pm2 start npm --name product-registration-backend -- start

            pm2 save

            nginx -t
            systemctl reload nginx

            echo "Deployment completed successfully."
          EOF
